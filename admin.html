<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Center - EduNovaX</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>
<body class="ultra-dark-body" style="overflow-y: auto;">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div id="admin-print-area" class="print-only"></div>

    <div id="custom-toast"></div>

    <nav class="navbar ultra-nav" style="width: 100%; position: absolute; top: 0;">
        <div class="logo"><span class="logo-text">Admin<span class="neon-highlight">Panel</span></span></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-hover">Live Website</a></li>
        </ul>
    </nav>

    <div class="admin-container fade-in-up" style="margin-top: 100px; width: 100%; max-width: 1000px; margin-left: auto; margin-right: auto; padding: 20px; position: relative; z-index: 10;">
        
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 class="neon-text" style="font-size: 3rem; margin-bottom: 10px;">Command Center</h1>
            <p style="color: #94a3b8; margin-bottom: 30px;">Manage your premium educational resources</p>
            
            <div class="admin-tab-container">
                <button class="admin-tab-btn active" id="tab-upload">
                    <svg style="width:18px; height:18px; margin-right:8px; display:inline-block; vertical-align:middle;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Upload Notes
                </button>
                <button class="admin-tab-btn" id="tab-manage">
                    <svg style="width:18px; height:18px; margin-right:8px; display:inline-block; vertical-align:middle;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    Manage Notes
                </button>
            </div>
        </div>

        <div id="section-upload" class="ultra-glass admin-section active" style="padding: 40px; border-radius: 20px;">
            <h2 id="admin-form-title" class="neon-text" style="margin-bottom: 25px; font-size: 1.8rem;">Upload New Notes</h2>
            <form id="admin-upload-form">
                <input type="hidden" id="edit-note-id">
                
                <div style="display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px;">
                        <label class="neon-label">Select Subject</label>
                        <select id="note-subject" required class="neon-input">
                            <option value="Zoology">Zoology</option>
                            <option value="Botany">Botany</option>
                            <option value="Applied Zoology">Applied Zoology</option>
                            <option value="English">English</option>
                            <option value="Geography">Geography</option>
                            <option value="Envs">Envs</option>
                            <option value="Constitutional Values">Constitutional Values</option>
                        </select>
                    </div>
                    <div style="flex: 1; min-width: 250px;">
                        <label class="neon-label">Select Semester</label>
                        <select id="note-semester" required class="neon-input">
                            <option value="Semester 1">Semester 1</option>
                            <option value="Semester 2">Semester 2</option>
                            <option value="Semester 3">Semester 3</option>
                            <option value="Semester 4">Semester 4</option>
                            <option value="Semester 5">Semester 5</option>
                            <option value="Semester 6">Semester 6</option>
                        </select>
                    </div>
                </div>

                <div class="input-group" style="margin-bottom: 20px;">
                    <label class="neon-label">Note Title / Topic Name</label>
                    <input type="text" id="note-title" class="neon-input" placeholder="e.g. Cell Structure & Function" required>
                </div>

                <div class="input-group" style="margin-bottom: 20px;">
                    <label class="neon-label">Upload Type</label>
                    <select id="note-type" class="neon-input">
                        <option value="link">Google Drive Link</option>
                        <option value="text">Direct Long Text</option>
                    </select>
                </div>

                <div class="input-group" id="link-input-div" style="margin-bottom: 25px;">
                    <label class="neon-label">Google Drive Link</label>
                    <input type="url" id="note-link" class="neon-input" placeholder="Paste Google Drive URL here">
                </div>

                <div class="input-group" id="text-input-div" style="display: none; margin-bottom: 25px;">
                    <label class="neon-label">Paste Long Text / Notes</label>
                    <textarea id="note-text" class="neon-input" rows="10" placeholder="Paste your complete notes here..."></textarea>
                </div>

                <div style="display: flex; gap: 15px;">
                    <button type="submit" class="btn neon-btn" id="upload-btn" style="flex: 2; padding: 15px; font-size: 1.1rem;">Upload Note</button>
                    <button type="button" class="btn close-neon-btn" id="cancel-edit-btn" style="flex: 1; display: none; margin: 0; padding: 15px;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <div id="section-manage" class="ultra-glass admin-section" style="padding: 40px; border-radius: 20px;">
            <h2 class="neon-text" style="margin-bottom: 25px; font-size: 1.8rem;">Manage Uploaded Notes</h2>
            <div id="admin-notes-list">
                <div class="cyber-spinner" style="margin: 30px auto;"></div>
            </div>
        </div>

    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
