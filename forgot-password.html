<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduNovaX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <h2>Reset Password</h2>
            <p style="margin-bottom: 20px; color: #7f8c8d; font-size: 0.9rem;">
                Enter your registered email address. We will send you a link to reset your password.
            </p>
            <form id="forgot-password-form">
                <div class="input-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" placeholder="Enter your email" required>
                </div>
                <button type="submit" class="btn login-btn">Send Reset Link</button>
            </form>
            <div class="login-links">
                <p>Remembered your password? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
